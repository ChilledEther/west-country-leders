<!-- Next Gathering Card - Styled consistently with venues and posts -->
<div class="next-gathering-container">
  <div class="next-gathering-card">
    <div class="card-header-badge badge-gathering">
      <i class="fa-solid fa-dice-d20"></i> Next Gathering
    </div>
  
  <div class="card-content">
    <div class="gathering-layout">
      <div class="gathering-info">
        <div id="event-banner-title" class="event-title">See what's coming up!</div>
        <div class="gathering-meta">
          <i class="fa-solid fa-calendar-days"></i>
          <span id="event-banner-date">Click Events for details →</span>
        </div>
      </div>
      
      <div class="gathering-actions">
        <a href="{{ '/events' | relative_url }}" class="gathering-button">
          <span>View Events</span>
          <i class="fa-solid fa-arrow-right"></i>
        </a>
      </div>
    </div>

    <!-- NoScript fallback -->
    <noscript>
      <div class="gathering-layout">
        <div class="gathering-info">
          <div class="event-title">Join our next game night!</div>
          <div class="gathering-meta">View all events for details.</div>
        </div>
        <div class="gathering-actions">
          <a href="{{ '/events' | relative_url }}" class="gathering-button">View Events</a>
        </div>
      </div>
    </noscript>
  </div>
</div>

<script>
  (function() {
    const calendarEmail = "westcountryleders@gmail.com";
    const icalUrl = "https://calendar.google.com/calendar/ical/" + encodeURIComponent(calendarEmail) + "/public/basic.ics";

    // Multiple CORS proxies as fallbacks - free proxies can block certain origins
    const proxyUrls = [
      "https://corsproxy.io/?" + encodeURIComponent(icalUrl),
      "https://api.allorigins.win/raw?url=" + encodeURIComponent(icalUrl),
      "https://corsproxy.org/?" + encodeURIComponent(icalUrl)
    ];
    
    const titleEl = document.getElementById('event-banner-title');
    const dateEl = document.getElementById('event-banner-date');

    function parseIcsDate(icsDate) {
      if (!icsDate) return null;
      const val = icsDate.trim();
      const year = val.substring(0, 4);
      const month = parseInt(val.substring(4, 6)) - 1;
      const day = val.substring(6, 8);
      
      let hour = 0, min = 0;
      if (val.length > 8 && val.includes('T')) {
          const tPos = val.indexOf('T');
          hour = val.substring(tPos + 1, tPos + 3);
          min = val.substring(tPos + 3, tPos + 5);
      }
      
      return new Date(Date.UTC(year, month, day, hour, min));
    }

    function formatShortDate(date) {
      return date.toLocaleDateString('en-GB', { 
        weekday: 'short', 
        day: 'numeric', 
        month: 'short',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function processIcal(content) {
      if (!content || !content.includes('BEGIN:VEVENT')) return false;

      var unfoldedContent = content.replace(/\r\n[ \t]/g, '').replace(/\n[ \t]/g, '');
      var events = [];
      var chunks = unfoldedContent.split('BEGIN:VEVENT');
      var now = new Date();
      now.setHours(0,0,0,0);

      for (var i = 1; i < chunks.length; i++) {
        var chunk = chunks[i];
        var summary = (chunk.match(/SUMMARY(?:;[^:]*)?:([^\r\n]+)/) || [])[1];
        var dtstart = (chunk.match(/DTSTART(?:;[^:]*)?:([^\r\n]+)/) || [])[1];

        if (dtstart) {
          var start = parseIcsDate(dtstart);
          if (start && start >= now) {
            events.push({
              title: (summary || "Event").trim().replace(/\\/g, ''),
              start: start
            });
          }
        }
      }

      events.sort(function(a, b) { return a.start - b.start; });

      if (events.length > 0) {
        var next = events[0];
        if (titleEl) titleEl.textContent = next.title;
        if (dateEl) dateEl.textContent = formatShortDate(next.start);
        return true;
      }
      return false;
    }

    function tryProxy(index) {
      if (index >= proxyUrls.length) {
        console.error("Calendar fetch: all proxies failed");
        return;
      }

      fetch(proxyUrls[index])
        .then(function(res) {
          if (!res.ok) throw new Error('Proxy ' + index + ' returned ' + res.status);
          return res.text();
        })
        .then(function(content) {
          if (!processIcal(content)) {
            throw new Error('Proxy ' + index + ' returned invalid iCal data');
          }
        })
        .catch(function(err) {
          console.warn("Calendar proxy " + index + " failed:", err.message);
          tryProxy(index + 1);
        });
    }

    tryProxy(0);
  })();
</script>
